x-default-conf: &default_conf
  restart: always
  networks:
    - immichStackNetwork
  logging:
    driver: "json-file"
    options:
      max-file: "2"
      max-size: "100m"

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}
  DB_PASSWORD: ${IMMICH_DB_PASSWORD}
  DB_HOSTNAME: immich_postgres
  DB_USERNAME: ${IMMICH_DB_USERNAME}
  DB_DATABASE_NAME: ${IMMICH_DB_NAME}
  REDIS_HOSTNAME: immich_redis

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    volumes:
      - /smb/backups/Immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *environment
    <<: *default_conf
    ports:
      - 2283:3001
    labels:
      - docker-volume-backup.stop-during-backup=true
    depends_on:
      - redis
      - database

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release-cuda
    extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
      file: hwaccel/hwaccel.ml.yml
      service: cuda # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    volumes:
      - ${DOCKERCONFDIR}/immich/model-cache-data:/cache
    environment:
      <<: *environment
    <<: *default_conf

  redis:
    container_name: immich_redis
    image: docker.io/redis:6.2-alpine@sha256:d6c2911ac51b289db208767581a5d154544f2b2fe4914ea5056443f62dc6e900
    <<: *default_conf

  database:
    container_name: immich_postgres
    image: docker.io/tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    #  user: ${PUID}:${PGID}
    command:
      [
        "postgres",
        "-c",
        "shared_preload_libraries=vectors.so",
        "-c",
        'search_path="$$user", public, vectors',
        "-c",
        "logging_collector=on",
        "-c",
        "max_wal_size=2GB",
        "-c",
        "shared_buffers=512MB",
        "-c",
        "wal_compression=on",
      ]
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    labels:
      - docker-volume-backup.archive-pre=bash -c 'mkdir -p /var/lib/postgresql/data/backups && rm -rf /var/lib/postgresql/data/backups/immich_postgres_db-dump* && pg_dump -U postgres -F t immich | gzip >/var/lib/postgresql/data/backups/immich_postgres_db-dump-$(date +%Y-%m-%d).tar.gz'
    volumes:
      - ${DOCKERCONFDIR}/immich/database-data:/var/lib/postgresql/data
    <<: *default_conf

networks:
  immichStackNetwork:
    driver: bridge
    external: true
