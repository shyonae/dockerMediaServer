- Important stuff:
    - Proxmox:
        icon: proxmox.png
        href: https://proxmox.yabailocal.duckdns.org
        siteMonitor: https://proxmox.yabailocal.duckdns.org
        description: main Proxmox server
        widget:
            type: proxmox
            url: https://proxmox.yabailocal.duckdns.org
            username: "{{HOMEPAGE_VAR_PROXMOX_USERNAME}}"
            password: "{{HOMEPAGE_VAR_PROXMOX_PASSWORD}}"
    - Proxmox-RD450:
        icon: proxmox.png
        href: https://rd450-proxmox.yabailocal.duckdns.org
        siteMonitor: https://rd450-proxmox.yabailocal.duckdns.org
