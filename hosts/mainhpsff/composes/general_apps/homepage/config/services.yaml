            type: proxmox
            url: https://rd450-proxmox.yabailocal.duckdns.org
            username: "{{HOMEPAGE_VAR_PROXMOX_USERNAME}}"
            password: "{{HOMEPAGE_VAR_PROXMOX_PASSWORD}}"
    - YabaiMediaVault:
        icon: openmediavault.png
        href: https://omv.yabailocal.duckdns.org
        siteMonitor: https://omv.yabailocal.duckdns.org
        description: NAS setup (services in widget)
        widget:
            type: openmediavault
            url: https://omv.yabailocal.duckdns.org
            username: "{{HOMEPAGE_VAR_OVM_USERNAME}}"
            password: "{{HOMEPAGE_VAR_OVM_PASSWORD}}"
