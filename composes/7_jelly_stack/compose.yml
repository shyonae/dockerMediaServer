version: "3.8"

x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - arrStackNetwork
    - jellyStackNetwork

x-authelia-conf: &authelia
  labels:
    - swag=enable
    - swag_auth=authelia

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}

services:
  jellyfin:
    container_name: jellyfin
    image: lscr.io/linuxserver/jellyfin:latest
    environment:
      <<: *environment
    <<: [*default_conf, *authelia]
    ports:
      - 8096:8096
    volumes:
      - jellyfin:/config
      - ${DOCKERSTORAGEDIR}/medialibrary:/data

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      <<: *environment
    <<: [*default_conf, *authelia]
    ports:
      - 5055:5055
    volumes:
      - jellyseerr:/app/config

volumes:
  jellyfin:
    name: jellyfin
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/media/docker-server/appdata/jellyfin
  jellyseerr:
    name: jellyseerr
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/media/docker-server/appdata/jellyseerr

networks:
  jellyStackNetwork:
    driver: bridge
    external: true
  arrStackNetwork:
    driver: bridge
    external: true
