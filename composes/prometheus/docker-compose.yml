version: "3.8"
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - 9090:9090
    user: "${PUID}:${PGID}"
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
    volumes:
      - ${DOCKERCONFDIR}/prometheus/config:/etc/prometheus
      - ${DOCKERCONFDIR}/prometheus/data:/prometheus
    command: "--config.file=/etc/prometheus//prometheus.yml"
    restart: unless-stopped
    networks:
      - shyDockerServer
    depends_on:
      - cadvisor
      - node_exporter

  node_exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - "--path.rootfs=/host"
    pid: host
    restart: unless-stopped
    volumes:
      - "/:/host:ro,rslave"
    networks:
      - shyDockerServer

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - 8081:8080
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - shyDockerServer

networks:
  shyDockerServer:
    driver: bridge
    external: true
