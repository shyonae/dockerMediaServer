  # ## WHATSUPDOCKER ##
  # whatsupdocker:
  #   image: fmartinou/whats-up-docker
  #   container_name: whatsupdocker
  #   environment:
  #     <<: *environment
  #     DOCKER_HOST: tcp://dockerproxy:2375
