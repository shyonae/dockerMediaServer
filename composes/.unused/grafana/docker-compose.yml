version: "3.8"
services:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    user: "${PUID}:${PGID}"
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKERCONFDIR}/grafana:/var/lib/grafana
    restart: unless-stopped
    labels:
      - swag=enable
      - swag_auth=authelia
    networks:
      - shyDockerServer

  loki:
    image: grafana/loki:2.8.0
    container_name: grafana-loki
    environment:
      TZ: ${TZ}
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ${DOCKERCONFDIR}/grafana/loki:/etc/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - shyDockerServer

  promtail:
    image: grafana/promtail:2.8.0
    container_name: grafana-promtail
    environment:
      TZ: ${TZ}
    restart: unless-stopped
    volumes:
      - /var/log:/var/log
      - ${DOCKERCONFDIR}/grafana/promtail:/etc/promtail
    command: -config.file=/etc/promtail/config.yml
    networks:
      - shyDockerServer

networks:
  shyDockerServer:
    driver: bridge
    external: true
