version: "3.8"

x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - headscaleNetwork

services:
  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    <<: *default_conf
    ports:
      - 8045:8080
      - 9092:9090
    command: headscale serve
    depends_on:
      - headscale_db
    volumes:
      - ${DOCKERCONFDIR}/headscale/container-config:/etc/headscale
      - ${DOCKERCONFDIR}/headscale/container-data/data:/var/lib/headscale

  headscale_db:
    image: postgres
    container_name: headscale_db
    environment:
      TZ: ${TZ}
      POSTGRES_PASSWORD: ${HEADSCALE_DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: headscale_db
    <<: *default_conf
    volumes:
      - ${DOCKERCONFDIR}/vaultwarden/postgres_storage:/var/lib/postgresql/data

  headscale_ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    container_name: headscale_ui
    ports:
      - 9443:443
    <<: *default_conf

networks:
  headscaleNetwork:
    driver: bridge
    external: true
