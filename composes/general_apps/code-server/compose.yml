version: "3.8"

services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
      DEFAULT_WORKSPACE: /config/workspace
    restart: unless-stopped
    networks:
      - generalStackNetwork
    labels:
      - swag=enable
      - swag_auth=authelia
    volumes:
      - code-server:/config
    ports:
      - 8443:8443

volumes:
  code-server:
    name: code-server
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/media/docker-server/appdata/code-server

networks:
  generalStackNetwork:
    driver: bridge
    external: true
