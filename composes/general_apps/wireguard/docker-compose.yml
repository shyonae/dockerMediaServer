version: "3.8"
services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      TZ: ${TZ}
      SERVERURL: auto
      SERVERPORT: 51820
      PEERS: peer1test
      PEERDNS: auto
    volumes:
      - ${DOCKERCONFDIR}/wireguard:/config
      - /lib/modules:/lib/modules
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - generalStackNetwork

networks:
  generalStackNetwork:
    driver: bridge
    external: true
