version: "3.8"

services:
  navidrome:
    image: deluan/navidrome:latest
    user: ${PUID}:${PGID}
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
    labels:
      - docker-volume-backup.stop-during-backup=true
    networks:
      - generalStackNetwork
    volumes:
      - ${DOCKERCONFDIR}/navidrome:/data
      - ${DOCKERSTORAGEDIR}/medialibrary/music:/music:ro

networks:
  generalStackNetwork:
    driver: bridge
    external: true
