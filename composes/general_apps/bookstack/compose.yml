version: "3.8"

x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - generalStackNetwork

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}

services:
  bookstack:
    image: lscr.io/linuxserver/bookstack
    container_name: bookstack
    environment:
      <<: *environment
      APP_URL: ${BOOKSTACK_APP_URL}
      DB_HOST: bookstack_db
      DB_PORT: 3306
      DB_USER: bookstack
      DB_PASS: ${BOOKSTACK_DB_PASSWORD}
      DB_DATABASE: bookstackapp
    <<: *default_conf
    labels:
      - swag=enable
      - swag_auth=authelia
    volumes:
      - bookstack_app_data:/config
    depends_on:
      - bookstack_db

  bookstack_db:
    image: lscr.io/linuxserver/mariadb
    container_name: bookstack_db
    environment:
      <<: *environment
      MYSQL_ROOT_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
      MYSQL_DATABASE: bookstackapp
      MYSQL_USER: bookstack
      MYSQL_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
    <<: *default_conf
    volumes:
      - bookstack_db_data:/config

volumes:
  bookstack_app_data:
    name: bookstack_app_data
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/media/docker-server/appdata/bookstack/bookstack_app_data
  bookstack_db_data:
    name: bookstack_db_data
    driver: local
    driver_opts:
      o: bind
      type: none
      device: /home/media/docker-server/appdata/bookstack/bookstack_db_data

networks:
  generalStackNetwork:
    driver: bridge
    external: true
