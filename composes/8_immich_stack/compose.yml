version: "3.8"

x-default-conf: &default_conf
  restart: always
  networks:
    - immichStackNetwork

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}
  DB_PASSWORD: ${IMMICH_DB_PASSWORD}
  DB_HOSTNAME: immich_postgres
  DB_USERNAME: ${IMMICH_DB_USERNAME}
  DB_DATABASE_NAME: ${IMMICH_DB_NAME}
  REDIS_HOSTNAME: immich_redis

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    command: ["start.sh", "immich"]
    volumes:
      - /smb/backups/Immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *environment
    <<: *default_conf
    ports:
      - 2283:3001
    labels:
      - docker-volume-backup.stop-during-backup=true
    depends_on:
      - redis
      - database

  immich-microservices:
    container_name: immich_microservices
    image: ghcr.io/immich-app/immich-server:release
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/hardware-transcoding
    #   file: hwaccel/hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    command: ["start.sh", "microservices"]
    volumes:
      - /smb/backups/Immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *environment
    <<: *default_conf
    labels:
      - docker-volume-backup.stop-during-backup=true
    depends_on:
      - redis
      - database

  # immich-machine-learning:
  #   container_name: immich_machine_learning
  #   # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
  #   # Example tag: ${IMMICH_VERSION:-release}-cuda
  #   image: ghcr.io/immich-app/immich-machine-learning:release
  #   # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
  #   #   file: hwaccel/hwaccel.ml.yml
  #   #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
  #   volumes:
  #     - /smb/backups/Immich/model-cache-data:/cache
  #   environment:
  #     <<: *environment
  #   <<: *default_conf

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine@sha256:51d6c56749a4243096327e3fb964a48ed92254357108449cb6e23999c37773c5
    <<: *default_conf

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0@sha256:90724186f0a3517cf6914295b5ab410db9ce23190a2d9d0b9dd6463e3fa298f0
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_NAME}
    labels:
      - docker-volume-backup.archive-pre=bash -c 'mkdir -p /var/lib/postgresql/data/backups && rm -rf /var/lib/postgresql/data/backups/immich_postgres_db-dump* && pg_dump -U postgres -F t immich | gzip >/var/lib/postgresql/data/backups/immich_postgres_db-dump-$(date +%Y-%m-%d).tar.gz'
    volumes:
      - ${DOCKERCONFDIR}/immich/database-data:/var/lib/postgresql/data
    <<: *default_conf

networks:
  immichStackNetwork:
    driver: bridge
    external: true
