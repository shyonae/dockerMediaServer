x-default-conf: &default_conf
  restart: unless-stopped
  networks:
    - swagStackNetwork
  logging:
    driver: "json-file"
    options:
      max-file: "2"
      max-size: "100m"

x-environment: &environment
  PGID: ${PGID}
  PUID: ${PUID}
  TZ: ${TZ}

services:
  authelia:
    image: authelia/authelia
    container_name: authelia
    environment:
      <<: *environment
    <<: *default_conf
    labels:
      - docker-volume-backup.stop-during-backup=true
    depends_on:
      - redis
    ports:
      - 9091:9091
    volumes:
      - ${DOCKERCONFDIR}/authelia:/config

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ${DOCKERCONFDIR}/redis/data:/root/redis
      - ${DOCKERCONFDIR}/redis/redis.conf:/usr/local/etc/redis/redis.conf
    <<: *default_conf
    networks:
      - swagStackNetwork
      - generalStackNetwork
    labels:
      - docker-volume-backup.stop-during-backup=true
    environment:
      - REDIS_PORT=6379
      - REDIS_DATABASES=16

  swag:
    image: lscr.io/linuxserver/swag:latest
    container_name: swag
    depends_on:
      - authelia
      - crowdsec
    cap_add:
      - NET_ADMIN
    environment:
      <<: *environment
      URL: ${SWAG_URL}
      SUBDOMAINS: wildcard
      VALIDATION: dns
      CERTPROVIDER: zerossl
      DNSPLUGIN: cloudflare
      STAGING: false
      PROPAGATION: 30
      EMAIL: ${DEFAULT_EMAIL}
      DOCKER_MODS: linuxserver/mods:universal-docker|linuxserver/mods:swag-auto-proxy|linuxserver/mods:universal-cloudflared|linuxserver/mods:swag-crowdsec|linuxserver/mods:swag-auto-reload|linuxserver/mods:swag-dashboard
      CROWDSEC_API_KEY: ${SWAG_CROWDSEC_API_KEY}
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      DOCKER_HOST: dockerproxy
      CF_ZONE_ID: ${SWAG_CF_ZONE_ID}
      CF_ACCOUNT_ID: ${SWAG_CF_ACCOUNT_ID}
      CF_API_TOKEN: ${SWAG_CF_API_TOKEN}
      CF_TUNNEL_NAME: ${SWAG_CF_TUNNEL_NAME}
      CF_TUNNEL_PASSWORD=: ${SWAG_CF_TUNNEL_PASSWORD}
      FILE__CF_TUNNEL_CONFIG: /config/tunnelconfig.yml
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "100m"
    networks:
      - swagStackNetwork
      - managementStackNetwork
      - arrStackNetwork
      - downloadStackNetwork
      - generalStackNetwork
      - socketProxyNetwork
      - guacamoleStackNetwork
      - musicStackNetwork
    labels:
      - docker-volume-backup.stop-during-backup=true
    ports:
      - 443:443
    volumes:
      - ${DOCKERCONFDIR}/swag:/config
    extra_hosts:
      - ${SWAG_EXTRA_HOSTS}

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cloudflare-ddns
    cap_add:
      - SETUID
      - SETGID
    cap_drop:
      - all
    read_only: true
    security_opt:
      - no-new-privileges:true
    <<: *default_conf
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - CF_API_TOKEN=${SWAG_CF_API_TOKEN}
      - DOMAINS=${SWAG_URL}
      - PROXIED=true

  crowdsec:
    image: docker.io/crowdsecurity/crowdsec:v1.6.0
    container_name: crowdsec
    # user: ${PUID}:${PGID}
    environment:
      <<: *environment
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve crowdsecurity/whitelist-good-actors"
      CUSTOM_HOSTNAME: ${CROWDSEC_CUSTOM_HOSTNAME}
    <<: *default_conf
    volumes:
      - ${DOCKERCONFDIR}/crowdsec/config:/etc/crowdsec:rw
      - ${DOCKERCONFDIR}/crowdsec/data:/var/lib/crowdsec/data:rw
      - ${DOCKERCONFDIR}/swag/log/nginx:/var/log/swag:ro
      - /var/log:/var/log/host:ro
    labels:
      - docker-volume-backup.stop-during-backup=true
    security_opt:
      - no-new-privileges=true

