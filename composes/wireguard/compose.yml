  #     - swagStackNetwork
  #     - managementStackNetwork
  #     - arrStackNetwork
  #     - downloadStackNetwork
  #     - generalStackNetwork
  #     - socketProxyNetwork
  #     - guacamoleStackNetwork

  wg-easy:
    image: weejewel/wg-easy
    container_name: wg-easy
    environment:
      WG_HOST: ${DUCKDNS_SUBDOMAIN}
      PASSWORD: ${WGEASY_PASSWORD}
      WG_DEFAULT_DNS: 1.1.1.1, 8.8.8.8, 8.8.4.4
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - swagStackNetwork
      - managementStackNetwork
      - arrStackNetwork
      - downloadStackNetwork
      - generalStackNetwork
      - socketProxyNetwork
      - guacamoleStackNetwork
    volumes:
      - ${DOCKERCONFDIR}/wg-easy:/etc/wireguard
    labels:
      - docker-volume-backup.stop-during-backup=true
    restart: unless-stopped
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"

  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: duckdns
    environment:
      <<: *environment
      SUBDOMAINS: ${DUCKDNS_SUBDOMAIN}
      TOKEN: ${DUCKDNS_TOKEN}
    <<: *default_conf

  swag_duckdns:
    image: lscr.io/linuxserver/swag
    container_name: swag_duckdns
    cap_add:
      - NET_ADMIN
    environment:
      <<: *environment
      DOCKER_MODS: linuxserver/mods:universal-docker|linuxserver/mods:swag-crowdsec
      CROWDSEC_API_KEY: ${SWAG_CROWDSEC_API_KEY}
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      URL: ${DUCKDNS_SUBDOMAIN}
      SUBDOMAINS: wildcard
      VALIDATION: duckdns
      DUCKDNSTOKEN: ${DUCKDNS_TOKEN}
    <<: *default_conf
    labels:
      - docker-volume-backup.stop-during-backup=true
    volumes:
      - ${DOCKERCONFDIR}/swag_duckdns:/config

networks:
  swagStackNetwork:
    driver: bridge
    external: true
  managementStackNetwork:
    driver: bridge
    external: true
  arrStackNetwork:
    driver: bridge
    external: true
  downloadStackNetwork:
    driver: bridge
    external: true
  generalStackNetwork:
    driver: bridge
    external: true
  socketProxyNetwork:
    driver: bridge
    external: true
  guacamoleStackNetwork:
    driver: bridge
    external: true
