  #     SERVERURL: ${DUCKDNS_SUBDOMAIN}
  #     SERVERPORT: 51820
  #     PEERS: phone,steamdeck
  #     PEERDNS: 1.1.1.1, 8.8.8.8, 8.8.4.4
  #   volumes:
  #     - ${DOCKERCONFDIR}/wireguard:/config
  #     - /lib/modules:/lib/modules
  #   ports:
  #     - 51820:51820/udp
  #   sysctls:
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   restart: unless-stopped
