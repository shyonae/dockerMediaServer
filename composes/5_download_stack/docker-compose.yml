version: "3.8"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PGID: ${PGID}
      PUID: ${PUID}
      UMASK: ${UMASK}
      TZ: ${TZ}
      WEBUI_PORT: 8080
    labels:
      - swag=enable
      - swag_auth=authelia
    networks:
      - downloadStackNetwork
      - arrStackNetwork
    volumes:
      - ${DOCKERCONFDIR}/qbittorrent:/config
      - ${DOCKERSTORAGEDIR}/downloads/torrents:/storage/downloads/torrents
    ports:
      - 8080:8080
    restart: unless-stopped

networks:
  downloadStackNetwork:
    driver: bridge
    external: true
  arrStackNetwork:
    driver: bridge
    external: true